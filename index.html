<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MER – Livestock & Dairy Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b3d0b, #1a5e1a, #2d6a4f);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 800px; width: 100%; text-align: center; }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeInUp 1s ease-out;
        }
        .logo {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: 5px;
            background: linear-gradient(135deg, #f9f3e7, #d4e09b, #a7c957);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .tagline {
            font-size: 1.3rem;
            font-weight: 300;
            margin-bottom: 40px;
            opacity: 0.9;
            letter-spacing: 1px;
        }
        .names {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .name-badge {
            background: rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.3s, background 0.3s;
        }
        .name-badge:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.25);
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 2px solid transparent;
            min-width: 220px;
        }
        .btn-marketplace {
            background: #f2c94c;
            color: #1a1a1a;
            border-color: #f2c94c;
        }
        .btn-marketplace:hover {
            background: transparent;
            color: #f2c94c;
            border-color: #f2c94c;
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(242,201,76,0.4);
        }
        .btn-tutorial {
            background: #6fcf97;
            color: #1a1a1a;
            border-color: #6fcf97;
        }
        .btn-tutorial:hover {
            background: transparent;
            color: #6fcf97;
            border-color: #6fcf97;
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(111,207,151,0.4);
        }
        .footer {
            margin-top: 60px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            .logo { font-size: 3.5rem; }
            .buttons { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 300px; }
            .names { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">MER</div>
            <div class="tagline">Premium Livestock & Dairy Solutions</div>
            <div class="names">
                <span class="name-badge">Miky</span>
                <span class="name-badge">Eyobed</span>
                <span class="name-badge">Rodas</span>
            </div>
            <div class="buttons">
                <a href="https://eyobedabraham.pythonanywhere.com" target="_blank" class="btn btn-marketplace">
                    🛒 Visit Marketplace
                </a>
                <a href="https://rodas.pythonanywhere.com" target="_blank" class="btn btn-tutorial">
                    📚 Free Tutorials
                </a>
            </div>
            <div class="footer">
                &copy; 2025 MER – Miky, Eyobed & Rodas. All rights reserved.
            </div>
        </div>
    </div>
</body>
</html>
