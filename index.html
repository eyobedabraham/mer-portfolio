<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MER – የእንስሳት እርባታ እና የወተት ምርቶች</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Montserrat:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0b2b1f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(74, 140, 74, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(180, 200, 100, 0.2) 0%, transparent 50%);
        }

        /* Floating leaves effect */
        .leaf {
            position: absolute;
            opacity: 0.1;
            pointer-events: none;
        }
        .leaf1 { top: 5%; left: 5%; font-size: 3rem; transform: rotate(-20deg); animation: float 6s ease-in-out infinite; }
        .leaf2 { bottom: 10%; right: 5%; font-size: 4rem; transform: rotate(30deg); animation: float 8s ease-in-out infinite; }
        .leaf3 { top: 20%; right: 15%; font-size: 2.5rem; transform: rotate(10deg); animation: float 7s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-20deg); }
            50% { transform: translateY(-20px) rotate(-10deg); }
        }

        .container {
            max-width: 900px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 70px 50px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
        }

        .logo {
            font-size: 6rem;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(180deg, #F7E08A 0%, #D6B85A 50%, #B68D3C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
            margin-bottom: 10px;
        }

        .amharic-tagline {
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            color: #e6e6b7;
            margin-bottom: 15px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .english-tagline {
            font-size: 1.2rem;
            font-weight: 400;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .founders {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .founder-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 20px 30px;
            border: 1px solid rgba(255,255,255,0.25);
            transition: all 0.4s ease;
            cursor: default;
            min-width: 120px;
        }

        .founder-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
        }

        .founder-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .founder-name-am {
            font-family: 'Amiri', serif;
            font-size: 1.1rem;
            color: #d4c07a;
            display: block;
            margin-top: 4px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 20px 45px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border: 2px solid transparent;
            min-width: 250px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .btn-marketplace {
            background: linear-gradient(135deg, #F2C94C, #F2994A);
            color: #1a1a1a;
            border-color: rgba(255,255,255,0.3);
        }
        .btn-marketplace:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 40px rgba(242, 201, 76, 0.5);
            background: linear-gradient(135deg, #F2994A, #F2C94C);
        }

        .btn-tutorial {
            background: linear-gradient(135deg, #6FCF97, #27AE60);
            color: #1a1a1a;
            border-color: rgba(255,255,255,0.3);
        }
        .btn-tutorial:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 40px rgba(111, 207, 151, 0.5);
            background: linear-gradient(135deg, #27AE60, #6FCF97);
        }

        .btn-icon {
            font-size: 1.5rem;
            margin-right: 8px;
        }

        .footer-text {
            margin-top: 50px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile */
        @media (max-width: 700px) {
            .card {
                padding: 50px 25px;
            }
            .logo {
                font-size: 4rem;
            }
            .amharic-tagline {
                font-size: 1.7rem;
            }
            .founders {
                gap: 15px;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Floating decorative elements -->
    <div class="leaf leaf1">🌿</div>
    <div class="leaf leaf2">🍃</div>
    <div class="leaf leaf3">🌱</div>

    <div class="container">
        <div class="card">
            <div class="logo">MER</div>
            <div class="amharic-tagline">ከፍተኛ የእንስሳት እርባታ እና የወተት ምርቶች</div>
            <div class="english-tagline">Premium Livestock & Dairy Hub</div>

            <div class="founders">
                <div class="founder-card">
                    <span class="founder-name">Miky</span>
                    <span class="founder-name-am">ሚኪ</span>
                </div>
                <div class="founder-card">
                    <span class="founder-name">Eyobed</span>
                    <span class="founder-name-am">እዮቤድ</span>
                </div>
                <div class="founder-card">
                    <span class="founder-name">Rodas</span>
                    <span class="founder-name-am">ሮዳስ</span>
                </div>
            </div>

            <div class="buttons">
                <a href="https://eyobed.pythonanywhere.com" target="_blank" class="btn btn-marketplace">
                    <span class="btn-icon">🛒</span> ገበያ (Marketplace)
                </a>
                <a href="https://rodas.pythonanywhere.com" target="_blank" class="btn btn-tutorial">
                    <span class="btn-icon">📚</span> ነጻ ትምህርቶች (Tutorials)
                </a>
            </div>

            <div class="footer-text">
                &copy; 2025 MER – ሚኪ፣ እዮቤድ፣ ሮዳስ
            </div>
        </div>
    </div>
</body>
</html>
